<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dartsnut Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var key = "dartsnut-theme";
        try {
          var stored = localStorage.getItem(key);
          if (stored === "dart") {
            try {
              localStorage.setItem(key, "dark");
            } catch (e2) {}
            document.documentElement.dataset.theme = "dark";
            return;
          }
          if (stored === "dark" || stored === "light") {
            document.documentElement.dataset.theme = stored;
            return;
          }
        } catch (e) {}
        try {
          if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
            document.documentElement.dataset.theme = "light";
            return;
          }
        } catch (e) {}
        document.documentElement.dataset.theme = "dark";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/renderer/main.tsx"></script>
  </body>
</html>
