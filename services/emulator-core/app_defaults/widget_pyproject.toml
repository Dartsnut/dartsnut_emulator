# Dartsnut managed default app dependencies.
# Copied from dartsnut_rpi; evdev omitted (Linux-only, not installable in desktop emulator).
[project]
name = "dartsnut-widget-default"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
    "aiohappyeyeballs==2.6.1",
    "aiohttp==3.13.3",
    "aiosignal==1.4.0",
    "attrs==25.4.0",
    "certifi==2026.1.4",
    "charset-normalizer==3.4.4",
    "frozenlist==1.8.0",
    "idna==3.11",
    "multidict==6.7.1",
    "numpy==2.4.2",
    "pillow==12.1.1",
    "propcache==0.4.1",
    "pydartsnut==1.2.1",
    "pygame-ce==2.5.7",
    "requests==2.32.5",
    "typing_extensions==4.15.0",
    "urllib3==2.6.3",
    "yarl==1.22.0",
]

[tool.uv]
package = false
